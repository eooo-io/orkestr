apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "orkestr.fullname" . }}
  labels:
    {{- include "orkestr.labels" . | nindent 4 }}
data:
  APP_ENV: {{ .Values.env.APP_ENV | quote }}
  APP_DEBUG: {{ .Values.env.APP_DEBUG | quote }}
  APP_URL: {{ .Values.env.APP_URL | quote }}
  LOG_CHANNEL: {{ .Values.env.LOG_CHANNEL | default "stderr" | quote }}
  CACHE_STORE: {{ .Values.env.CACHE_STORE | default "file" | quote }}
  SESSION_DRIVER: {{ .Values.env.SESSION_DRIVER | default "file" | quote }}
  QUEUE_CONNECTION: {{ .Values.env.QUEUE_CONNECTION | default "database" | quote }}
  DB_CONNECTION: "mysql"
  DB_HOST: {{ include "orkestr.mariadb.host" . | quote }}
  DB_PORT: "3306"
  DB_DATABASE: {{ .Values.mariadb.auth.database | quote }}
  DB_USERNAME: {{ .Values.mariadb.auth.username | quote }}
  {{- if .Values.env.OLLAMA_HOST }}
  OLLAMA_HOST: {{ .Values.env.OLLAMA_HOST | quote }}
  {{- end }}
  {{- range $key, $value := .Values.extraEnv }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
