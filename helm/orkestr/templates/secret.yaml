apiVersion: v1
kind: Secret
metadata:
  name: {{ include "orkestr.fullname" . }}
  labels:
    {{- include "orkestr.labels" . | nindent 4 }}
type: Opaque
stringData:
  APP_KEY: {{ .Values.env.APP_KEY | quote }}
  DB_PASSWORD: {{ .Values.mariadb.auth.password | quote }}
  {{- if .Values.mariadb.enabled }}
  DB_ROOT_PASSWORD: {{ .Values.mariadb.auth.rootPassword | quote }}
  {{- end }}
  {{- if .Values.env.ANTHROPIC_API_KEY }}
  ANTHROPIC_API_KEY: {{ .Values.env.ANTHROPIC_API_KEY | quote }}
  {{- end }}
  {{- if .Values.env.OPENAI_API_KEY }}
  OPENAI_API_KEY: {{ .Values.env.OPENAI_API_KEY | quote }}
  {{- end }}
  {{- range $key, $value := .Values.extraSecrets }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
