<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agentis Studio — Universal AI Skill Manager</title>
    <meta name="description" content="Define, edit, and organize reusable AI skills in a provider-agnostic format. Sync to Claude, Cursor, Copilot, Windsurf, Cline, and OpenAI from a single source of truth." />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Agentis Studio — Universal AI Skill Manager" />
    <meta property="og:description" content="One source of truth for all your AI skills. Define prompts once, sync to every provider." />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:url" content="https://agentis.studio" />
    <meta property="og:site_name" content="Agentis Studio" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Agentis Studio — Universal AI Skill Manager" />
    <meta name="twitter:description" content="One source of truth for all your AI skills. Define prompts once, sync to every provider." />
    <meta name="twitter:image" content="/og-image.png" />
  </head>
  <body>
    <script>
      // Apply theme before React mounts to prevent flash
      (function() {
        var t = localStorage.getItem('theme') || 'system';
        var dark = t === 'dark' || (t === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
        if (dark) document.documentElement.classList.add('dark');
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
