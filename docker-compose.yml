services:
  php:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - .:/var/www/app
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
      - projects:/projects
    depends_on:
      - mariadb
      - redis
    command: >
      sh -c "php artisan serve --host=0.0.0.0 --port=8000 --env=docker"
    networks:
      - agentis

  mariadb:
    image: mariadb:11
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: agentis
      MARIADB_USER: agentis
      MARIADB_PASSWORD: secret
    volumes:
      - mariadb_data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - agentis

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - agentis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: agentis_knowledge
      POSTGRES_USER: agentis
      POSTGRES_PASSWORD: ${KNOWLEDGE_DB_PASSWORD:-agentis}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentis"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agentis
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-agentis}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-agentis123}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agentis
    restart: unless-stopped

  queue-worker:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    command: >
      sh -c "php artisan queue:work redis --sleep=3 --tries=3 --max-time=3600"
    volumes:
      - .:/var/www/app
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
      - projects:/projects
    depends_on:
      - php
      - mariadb
      - redis
    networks:
      - agentis
    restart: unless-stopped

volumes:
  mariadb_data:
  redis_data:
  postgres_data:
  minio_data:
  projects:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PROJECTS_HOST_PATH:-.}

networks:
  agentis:
    driver: bridge
